name: Run Model Evaluation

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model name to evaluate'
        required: true
        type: string
      puzzles:
        description: 'Number of puzzles to run (ignored when canonical is true)'
        required: false
        type: string
      canonical:
        description: 'Run canonical puzzle set (default: true). Set to false for random puzzles.'
        required: false
        default: 'true'
        type: string

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit docs changes back to repo
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for proper git operations

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        # astral-sh/setup-uv doesn't publish floating major tags (only v8.1.0,
        # v8.0.0, etc.), so pin exactly. Bump deliberately when validated.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
      
      - name: Install dependencies
        run: uv sync
      
      - name: Run evaluation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DB: ${{ secrets.MOTHERDUCK_DB }}
        run: |
          export MOTHERDUCK_DB="${MOTHERDUCK_DB:-md:}"
          CANONICAL="${{ inputs.canonical }}"
          if [ "$CANONICAL" = "true" ]; then
            uv run connections_eval run --model "${{ inputs.model }}" --canonical --threads 8
          else
            PUZZLES="${{ inputs.puzzles }}"
            if [ -z "$PUZZLES" ]; then
              PUZZLES="1"
            fi
            uv run connections_eval run --model "${{ inputs.model }}" --puzzles "$PUZZLES" --threads 8
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Regenerate docs and push (rebase-safe retry)
        # docs/, results/ and README.md are DERIVED from MotherDuck, which
        # already has this run's data. Parallel runs race on `git push`, so on
        # every attempt we re-sync to the latest main and regenerate from
        # MotherDuck (picking up all concurrent runs' rows) before committing.
        # This avoids merge conflicts on the generated files entirely.
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DB: ${{ secrets.MOTHERDUCK_DB }}
        run: |
          export MOTHERDUCK_DB="${MOTHERDUCK_DB:-md:}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          regenerate() {
            uv run python scripts/extract_summaries.py
            uv run python scripts/create_results_mviz.py
            uv run python scripts/generate_logs_view.py
          }

          for attempt in $(seq 1 8); do
            git fetch origin main
            git reset --hard origin/main
            regenerate
            git add docs/ results/ README.md
            if git diff --staged --quiet; then
              echo "No doc changes to commit (attempt $attempt)"
              exit 0
            fi
            git commit -m "Update docs: ${{ inputs.model }} evaluation results"
            if git push origin HEAD:main; then
              echo "Pushed successfully on attempt $attempt"
              exit 0
            fi
            backoff=$(( (RANDOM % 10) + attempt * 5 ))
            echo "Push rejected (attempt $attempt); main moved. Retrying in ${backoff}s..."
            sleep "$backoff"
          done
          echo "Failed to push after 8 attempts" >&2
          exit 1

