# Per-model rate-limit policy. The runtime token bucket adapts (AIMD), so
# `rps` is a starting point — it'll grow toward `rps_max` while requests
# succeed and halve toward `rps_min` on every 429.
#
# Resolution order: exact model id → suffix patterns starting with ":" →
# prefix patterns ending with "/" → defaults.
defaults:
  rps: 8.0          # starting requests per second per model
  rps_max: 16.0     # ceiling the bucket can climb to
  rps_min: 0.5      # floor — we never starve completely
  burst: 8.0        # tokens accumulated when idle (initial bucket size)
  aimd_step: 0.5    # additive growth per successful request
  concurrency: 8    # max simultaneous in-flight requests

policies:
  # Free-tier OpenRouter endpoints share aggressive rate limits across the
  # whole project — start slow, climb cautiously, throttle hard on 429.
  ":free":
    rps: 1.0
    rps_max: 3.0
    rps_min: 0.2
    burst: 1.0
    aimd_step: 0.1
    concurrency: 2

  # deepseek-v4-pro returns 429s under the default 8-rps / 8-concurrency load.
  # Start in the middle ground between :free and defaults; AIMD will climb back
  # if the upstream is healthier than we assume.
  "deepseek/deepseek-v4-pro":
    rps: 2.0
    rps_max: 6.0
    rps_min: 0.3
    burst: 2.0
    aimd_step: 0.2
    concurrency: 3

  # claude-fable-5 is newly released; Anthropic capacity is tight and we pin the
  # provider with allow_fallbacks=False (for prompt caching), so a 429 has no
  # fallback to escape to. A 20-puzzle run on 2026-06-09 lost puzzle 814 to a
  # sustained 429 that exhausted all retries. Start conservative; AIMD climbs
  # back as capacity frees up.
  "anthropic/claude-fable-5":
    rps: 2.0
    rps_max: 6.0
    rps_min: 0.3
    burst: 2.0
    aimd_step: 0.2
    concurrency: 3

  # thinkingmachines/inkling is a newly added route with very tight upstream
  # capacity. A 20-puzzle canonical run on 2026-07-21 with the default 8-rps /
  # 8-concurrency load solved 0/20 and burned 1432s in 429 backoff (most puzzle
  # turns exhausted their retry budget before landing a guess). Start as
  # conservatively as a free-tier endpoint; AIMD will climb if capacity allows.
  "thinkingmachines/inkling":
    rps: 1.0
    rps_max: 3.0
    rps_min: 0.2
    burst: 1.0
    aimd_step: 0.1
    concurrency: 2
